<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Relationship Map | FOCUS Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Semi+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* FOCUS Learning Brand Colors */
            --navy: #10285A;
            --blue-dark: #1A4481;
            --blue-mid: #15688E;
            --teal-dark: #108B9A;
            --teal-mid: #0BAFA6;
            --teal-light: #05D2B2;
            --orange: #ED7D2F;
            
            /* UI Colors */
            --bg-dark: #10285A;
            --bg-card: #1A4481;
            --accent-primary: #05D2B2;
            --accent-secondary: #0BAFA6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --border: rgba(255,255,255,0.12);
        }

        body {
            font-family: 'Archivo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px;
        }

        h1 {
            font-family: 'Archivo Semi Condensed', 'Archivo', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--teal-light), var(--teal-mid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Logo area */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            background: #ffffff;
            padding: 16px 32px;
            border-radius: 12px;
            display: inline-block;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            height: 60px;
            width: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 240px;
            height: auto;
        }

        .logo-text {
            font-family: 'Archivo Semi Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .logo-text .focus {
            color: var(--navy);
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .logo-text .learning {
            color: var(--teal-light);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.goal { background: var(--teal-light); }
        .legend-dot.initiative { background: var(--blue-mid); }
        .legend-dot.team { background: var(--orange); }

        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 24px;
            min-height: 700px;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Archivo Semi Condensed', 'Archivo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            border-radius: 2px;
        }

        .goals-panel .panel-title::before { background: var(--teal-light); }
        .teams-panel .panel-title::before { background: var(--orange); }

        .list-item {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 0.875rem;
        }

        .list-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .list-item.active {
            border-color: var(--teal-light);
            background: rgba(5, 210, 178, 0.1);
        }

        .list-item.team.active {
            border-color: var(--orange);
            background: rgba(237, 125, 47, 0.1);
        }

        .goal-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .canvas-container {
            position: relative;
            background: radial-gradient(ellipse at center, rgba(5, 210, 178, 0.08) 0%, transparent 70%);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        #networkCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tooltip {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            max-width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tooltip-type {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            padding: 32px;
            transition: right 0.3s ease;
            z-index: 100;
            overflow-y: auto;
        }

        .detail-panel.open {
            right: 0;
        }

        .detail-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .detail-header {
            margin-bottom: 24px;
        }

        .detail-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--teal-light);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-title {
            font-family: 'Archivo Semi Condensed', 'Archivo', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag.goal {
            background: rgba(5, 210, 178, 0.2);
            color: var(--teal-light);
        }

        .tag.team {
            background: rgba(237, 125, 47, 0.2);
            color: var(--orange);
        }

        .tag.initiative {
            background: rgba(21, 104, 142, 0.3);
            color: #7dd3fc;
        }

        .tag:hover {
            transform: translateY(-2px);
        }

        .members-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(237, 125, 47, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .member-icon {
            font-size: 1rem;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Archivo', sans-serif;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--teal-light);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--teal-mid), var(--teal-light));
            color: var(--navy);
            border-color: var(--teal-light);
            font-weight: 600;
        }

        .footer-bar {
            margin-top: 40px;
            padding: 16px 24px;
            background: linear-gradient(90deg, var(--teal-light) 0%, var(--teal-mid) 50%, var(--blue-mid) 100%);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-bar span {
            font-size: 0.875rem;
            color: var(--navy);
            font-weight: 500;
        }

        .footer-bar a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .panel {
                max-height: 300px;
                overflow-y: auto;
            }

            .canvas-container {
                min-height: 500px;
            }
        }
    </style>
</head>
<body><div class="container">
    <header>
        <div class="logo-container">
            <img 
                src="https://focuslearning.com/hubfs/FOCUS%20Branding/focusLearning_gradient.svg" 
                alt="Focus Learning Logo" 
                class="logo-icon"
                height="60"
            >
        </div>
        <h1>Strategic Relationship Map</h1>
        <p class="subtitle">Interactive visualization of goals, initiatives, and team alignment</p>
    </header>
    
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot goal"></div>
                <span>Strategic Goals</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot initiative"></div>
                <span>Initiatives</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot team"></div>
                <span>Teams</span>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="goals">Goals</button>
            <button class="filter-btn" data-filter="initiatives">Initiatives</button>
            <button class="filter-btn" data-filter="teams">Teams</button>
        </div>

        <div class="main-layout">
            <div class="panel goals-panel">
                <h2 class="panel-title">Strategic Goals</h2>
                <div id="goalsList"></div>
            </div>

            <div class="canvas-container">
                <canvas id="networkCanvas"></canvas>
            </div>

            <div class="panel teams-panel">
                <h2 class="panel-title">Teams</h2>
                <div id="teamsList"></div>
            </div>
        </div>

        <div class="footer-bar">
            <span>FOCUS Learning Corporation</span>
            <span>Empowering the world through workforce performance</span>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-type"></div>
        <div class="tooltip-title"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div class="detail-header">
            <div class="detail-type" id="detailType"></div>
            <h2 class="detail-title" id="detailTitle"></h2>
        </div>
        <div id="detailContent"></div>
    </div>

    <script>
        /*
        ╔══════════════════════════════════════════════════════════════════════════════╗
        ║                        HOW TO EDIT THIS RELATIONSHIP MAP                      ║
        ╠══════════════════════════════════════════════════════════════════════════════╣
        ║                                                                              ║
        ║  📌 EDITING THE DATA:                                                        ║
        ║  All data is in the "data" object below. You can edit:                       ║
        ║                                                                              ║
        ║  1. GOALS - Edit the "goals" array:                                          ║
        ║     • id: unique identifier (g1, g2, etc.) - used to link initiatives        ║
        ║     • name: display name of the goal                                         ║
        ║     • color: hex color code (use brand colors from palette)                  ║
        ║                                                                              ║
        ║     Example:                                                                 ║
        ║     { id: 'g7', name: 'New Strategic Goal', color: '#05D2B2' }               ║
        ║                                                                              ║
        ║  2. INITIATIVES - Edit the "initiatives" array:                              ║
        ║     • id: unique identifier (i1, i2, etc.)                                   ║
        ║     • name: display name of the initiative                                   ║
        ║     • goals: array of goal IDs this initiative supports (e.g., ['g1', 'g2']) ║
        ║     • teams: array of team IDs involved (e.g., ['t1', 't3'])                 ║
        ║                                                                              ║
        ║     Example:                                                                 ║
        ║     { id: 'i17', name: 'New Initiative', goals: ['g1'], teams: ['t2', 't4'] }║
        ║                                                                              ║
        ║  3. TEAMS - Edit the "teams" array:                                          ║
        ║     • id: unique identifier (t1, t2, etc.) - used to link initiatives        ║
        ║     • name: display name of the team                                         ║
        ║     • color: hex color code (currently all use brand orange #ED7D2F)         ║
        ║     • members: array of team member names                                    ║
        ║                                                                              ║
        ║     Example:                                                                 ║
        ║     { id: 't8', name: 'New Team', color: '#ED7D2F',                          ║
        ║       members: ['Person 1', 'Person 2'] }                                    ║
        ║                                                                              ║
        ║  📌 NODE SIZE SETTINGS (search for "NODE SIZE SETTINGS" below):              ║
        ║     • goalNodeRadius: size of goal circles (default: 45)                     ║
        ║     • initiativeNodeRadius: size of initiative circles (default: 32)         ║
        ║     • teamNodeRadius: size of team circles (default: 38)                     ║
        ║                                                                              ║
        ║  📌 BRAND COLORS (from FOCUS Learning Brand Guide):                          ║
        ║     Navy:       #10285A                                                      ║
        ║     Blue Dark:  #1A4481                                                      ║
        ║     Blue Mid:   #15688E                                                      ║
        ║     Teal Dark:  #108B9A                                                      ║
        ║     Teal Mid:   #0BAFA6                                                      ║
        ║     Teal Light: #05D2B2                                                      ║
        ║     Orange:     #ED7D2F                                                      ║
        ║                                                                              ║
        ║  📌 TIPS:                                                                    ║
        ║     • Keep IDs unique and sequential                                         ║
        ║     • When adding a new goal/team, remember to update initiative references  ║
        ║     • Test in browser after changes to catch any syntax errors               ║
        ║     • Use browser console (F12) to debug if something breaks                 ║
        ║                                                                              ║
        ╚══════════════════════════════════════════════════════════════════════════════╝
        */

        // ═══════════════════════════════════════════════════════════════════════════
        // NODE SIZE SETTINGS - Adjust these to change circle sizes
        // ═══════════════════════════════════════════════════════════════════════════
        const goalNodeRadius = 45;        // Goals (inner ring) - was 28
        const initiativeNodeRadius = 32;  // Initiatives (middle ring) - was 18
        const teamNodeRadius = 38;        // Teams (outer ring) - was 22

        // Ring spacing (how far from center each ring is)
        const goalRingMultiplier = 0.16;       // Inner ring - goals
        const initiativeRingMultiplier = 0.36; // Middle ring - initiatives  
        const teamRingMultiplier = 0.54;       // Outer ring - teams

        // ═══════════════════════════════════════════════════════════════════════════
        // DATA MODEL - EDIT YOUR GOALS, INITIATIVES, AND TEAMS BELOW
        // ═══════════════════════════════════════════════════════════════════════════
        
        const data = {
            // ─────────────────────────────────────────────────────────────────────────
            // GOALS - Your strategic objectives
            // ─────────────────────────────────────────────────────────────────────────
            goals: [
                { id: 'g1', name: 'Sustained 35%+ YoY Growth', color: '#05D2B2' },
                { id: 'g2', name: 'Modern Technology', color: '#0BAFA6' },
                { id: 'g3', name: 'Consistent Renewals & Customer Satisfaction', color: '#108B9A' },
                { id: 'g4', name: 'Operational Discipline', color: '#15688E' },
                { id: 'g5', name: 'M&A Integration Excellence', color: '#1A4481' },
            
            ],
            
            // ─────────────────────────────────────────────────────────────────────────
            // INITIATIVES - Projects/programs that support goals
            // Link to goals and teams using their IDs
            // ─────────────────────────────────────────────────────────────────────────
            initiatives: [
                { id: 'i1', name: 'Upsell/Cross-sell Program', goals: ['g1'], teams: ['t1', 't2'] },
                { id: 'i2', name: 'International Nuclear Expansion', goals: ['g1', 'g6'], teams: ['t1', 't3'] },
                { id: 'i3', name: 'Bundled Product Offerings', goals: ['g1'], teams: ['t2', 't4'] },
                { id: 'i4', name: 'Strengthen Top of Funnel', goals:['g1'], teams: ['t2','t4']},
                { id: 'i5', name: 'On-prem to Cloud Migration', goals: ['g2'], teams: ['t4', 't5'] },
                { id: 'i6', name: 'AI Learning & Automation', goals: ['g2', 'g4'], teams: ['t4', 't2'] },
                { id: 'i7', name: 'SOC 2 Type II Certification', goals: ['g2'], teams: ['t5', 't6'] },
                { id: 'i8', name: 'CRM & Pipeline Hygiene', goals: ['g3', 'g4'], teams: ['t1'] },
                { id: 'i9', name: 'Customer Sentiment Tracking', goals: ['g3'], teams: ['t2'] },
                { id: 'i10', name: 'Lifecycle Playbooks', goals: ['g3'], teams: ['t2', 't1'] },
                { id: 'i11', name: 'Performance Management Cadence', goals: ['g4'], teams: ['t6'] },
                { id: 'i12', name: 'Budget & Cost Visibility', goals: ['g4'], teams: ['t6'] },
                { id: 'i13', name: 'QTS Integration', goals: ['g5'], teams: ['t3', 't4', 't6'] },
                { id: 'i14', name: 'M&A Integration Playbook', goals: ['g5'], teams: ['t3', 't6'] },
                { id: 'i15', name: 'Outbound Demand Generation', goals: ['g1'], teams: ['t3', 't1'] },
                { id: 'i16', name: 'Industry Events Strategy', goals: ['g1'], teams: ['t3'] },
                { id: 'i17', name: 'Account Management Maturation', goals: ['g3', 'g1'], teams: ['t2', 't1'] }
            ],
            
            // ─────────────────────────────────────────────────────────────────────────
            // TEAMS - Your organizational teams with members
            // ─────────────────────────────────────────────────────────────────────────
            teams: [
                { id: 't1', name: 'Sales', color: '#ED7D2F', members: ['Kris Kaladecek', 'John McMillian'] },
                { id: 't2', name: 'Customer Success', color: '#ED7D2F', members: ['Tim Hickey','Sandy Nietling', 'Justin Moore'] },
                { id: 't3', name: 'Marketing', color: '#ED7D2F', members: ['Tim Hickey', 'Alyssa Restauro', 'John McMillian'] },
                { id: 't4', name: 'Product & Engineering', color: '#ED7D2F', members: ['Jonas Dodoo', 'Dan Brannon', 'Jeremiah Tilley'] },
                { id: 't5', name: 'IT & Security', color: '#ED7D2F', members: ['Nate Jones'] },
                { id: 't6', name: 'Finance & Operations', color: '#ED7D2F', members: ['Eric Nieters', 'Alyssa Restauro'] }
            ]
        };
        
        // ═══════════════════════════════════════════════════════════════════════════
        // END OF EDITABLE DATA - Do not modify code below unless you know JavaScript
        // ═══════════════════════════════════════════════════════════════════════════

        // Canvas Setup
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let edges = [];
        let hoveredNode = null;
        let selectedNode = null;
        let activeFilter = 'all';
        let animationFrame;

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * 2;
            canvas.height = container.clientHeight * 2;
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            ctx.scale(2, 2);
            initializeNodes();
        }

        function initializeNodes() {
            nodes = [];
            edges = [];
            
            const width = canvas.width / 2;
            const height = canvas.height / 2;
            const centerX = width / 2;
            const centerY = height / 2;

            // Position goals in inner circle
            const goalRadius = Math.min(width, height) * goalRingMultiplier;
            data.goals.forEach((goal, i) => {
                const angle = (i / data.goals.length) * Math.PI * 2 - Math.PI / 2;
                nodes.push({
                    ...goal,
                    type: 'goal',
                    x: centerX + Math.cos(angle) * goalRadius,
                    y: centerY + Math.sin(angle) * goalRadius,
                    targetX: centerX + Math.cos(angle) * goalRadius,
                    targetY: centerY + Math.sin(angle) * goalRadius,
                    radius: goalNodeRadius,
                    vx: 0,
                    vy: 0
                });
            });

            // Position initiatives in middle ring
            const initiativeRadius = Math.min(width, height) * initiativeRingMultiplier;
            data.initiatives.forEach((init, i) => {
                const angle = (i / data.initiatives.length) * Math.PI * 2 - Math.PI / 2;
                // Get color from first connected goal
                const primaryGoal = data.goals.find(g => g.id === init.goals[0]);
                const initColor = primaryGoal ? primaryGoal.color : '#14b8a6';
                const node = {
                    ...init,
                    type: 'initiative',
                    color: initColor,
                    x: centerX + Math.cos(angle) * initiativeRadius,
                    y: centerY + Math.sin(angle) * initiativeRadius,
                    targetX: centerX + Math.cos(angle) * initiativeRadius,
                    targetY: centerY + Math.sin(angle) * initiativeRadius,
                    radius: initiativeNodeRadius,
                    vx: 0,
                    vy: 0
                };
                nodes.push(node);

                // Create edges to goals
                init.goals.forEach(goalId => {
                    edges.push({
                        source: init.id,
                        target: goalId,
                        type: 'goal-initiative'
                    });
                });

                // Create edges to teams
                init.teams.forEach(teamId => {
                    edges.push({
                        source: init.id,
                        target: teamId,
                        type: 'initiative-team'
                    });
                });
            });

            // Position teams in outer ring
            const teamRadius = Math.min(width, height) * teamRingMultiplier;
            data.teams.forEach((team, i) => {
                const angle = (i / data.teams.length) * Math.PI * 2 - Math.PI / 2;
                nodes.push({
                    ...team,
                    type: 'team',
                    x: centerX + Math.cos(angle) * teamRadius,
                    y: centerY + Math.sin(angle) * teamRadius,
                    targetX: centerX + Math.cos(angle) * teamRadius,
                    targetY: centerY + Math.sin(angle) * teamRadius,
                    radius: teamNodeRadius,
                    vx: 0,
                    vy: 0
                });
            });
        }

        function getNodeById(id) {
            return nodes.find(n => n.id === id);
        }

        function isConnected(nodeA, nodeB) {
            return edges.some(e => 
                (e.source === nodeA.id && e.target === nodeB.id) ||
                (e.target === nodeA.id && e.source === nodeB.id)
            );
        }

        function getConnectedNodes(node) {
            const connected = new Set();
            edges.forEach(e => {
                if (e.source === node.id) connected.add(e.target);
                if (e.target === node.id) connected.add(e.source);
            });
            return connected;
        }

        function draw() {
            const width = canvas.width / 2;
            const height = canvas.height / 2;
            
            ctx.clearRect(0, 0, width, height);

            // Draw edges
            edges.forEach(edge => {
                const source = getNodeById(edge.source);
                const target = getNodeById(edge.target);
                if (!source || !target) return;

                let opacity = 0.15;
                let lineWidth = 1;

                if (hoveredNode) {
                    const connected = getConnectedNodes(hoveredNode);
                    if (hoveredNode.id === source.id || hoveredNode.id === target.id) {
                        opacity = 0.6;
                        lineWidth = 2;
                    } else if (connected.has(source.id) || connected.has(target.id)) {
                        opacity = 0.1;
                    } else {
                        opacity = 0.03;
                    }
                }

                if (selectedNode) {
                    const connected = getConnectedNodes(selectedNode);
                    if (selectedNode.id === source.id || selectedNode.id === target.id) {
                        opacity = 0.8;
                        lineWidth = 2.5;
                    } else {
                        opacity = 0.03;
                    }
                }

                // Filter logic
                if (activeFilter !== 'all') {
                    if (activeFilter === 'goals' && edge.type !== 'goal-initiative') {
                        opacity = 0.02;
                    }
                    if (activeFilter === 'teams' && edge.type !== 'initiative-team') {
                        opacity = 0.02;
                    }
                }

                const gradient = ctx.createLinearGradient(source.x, source.y, target.x, target.y);
                const sourceColor = source.color || '#3b82f6';
                const targetColor = target.color || '#14b8a6';
                const opacityHex = Math.floor(Math.max(0, Math.min(1, opacity)) * 255).toString(16).padStart(2, '0');
                gradient.addColorStop(0, sourceColor + opacityHex);
                gradient.addColorStop(1, targetColor + opacityHex);

                ctx.beginPath();
                ctx.moveTo(source.x, source.y);
                ctx.lineTo(target.x, target.y);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            });

            // Draw nodes
            nodes.forEach(node => {
                let opacity = 1;
                let scale = 1;

                if (hoveredNode && hoveredNode.id !== node.id) {
                    const connected = getConnectedNodes(hoveredNode);
                    if (!connected.has(node.id)) {
                        opacity = 0.3;
                    }
                }

                if (selectedNode && selectedNode.id !== node.id) {
                    const connected = getConnectedNodes(selectedNode);
                    if (!connected.has(node.id)) {
                        opacity = 0.2;
                    }
                }

                if (hoveredNode && hoveredNode.id === node.id) {
                    scale = 1.1;
                }

                // Filter logic
                if (activeFilter !== 'all') {
                    if (activeFilter === 'goals' && node.type !== 'goal' && node.type !== 'initiative') {
                        opacity = 0.15;
                    }
                    if (activeFilter === 'teams' && node.type !== 'team' && node.type !== 'initiative') {
                        opacity = 0.15;
                    }
                    if (activeFilter === 'initiatives' && node.type !== 'initiative') {
                        opacity = 0.4;
                    }
                }

                const radius = node.radius * scale;

                // Glow effect for hovered
                if (hoveredNode && hoveredNode.id === node.id) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, radius + 8, 0, Math.PI * 2);
                    const glow = ctx.createRadialGradient(node.x, node.y, radius, node.x, node.y, radius + 12);
                    glow.addColorStop(0, node.color + '40');
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.fill();
                }

                // Node circle
                const nodeColor = node.color || '#3b82f6';
                const nodeOpacityHex = Math.floor(Math.max(0, Math.min(1, opacity)) * 255).toString(16).padStart(2, '0');
                ctx.beginPath();
                ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = nodeColor + nodeOpacityHex;
                ctx.fill();

                // Border
                ctx.strokeStyle = 'rgba(255,255,255,' + (opacity * 0.3) + ')';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text label with word wrap
                ctx.fillStyle = 'rgba(255,255,255,' + opacity + ')';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Adjust font size based on node type
                const fontSize = node.type === 'goal' ? 11 : node.type === 'team' ? 10 : 9;
                ctx.font = `600 ${fontSize}px 'Archivo'`;

                // Word wrap logic
                const words = node.name.split(' ');
                const maxWidth = radius * 1.7;
                let lines = [];
                let currentLine = '';

                words.forEach(word => {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                });
                if (currentLine) lines.push(currentLine);

                // Limit lines based on node size
                const maxLines = node.type === 'goal' ? 3 : node.type === 'team' ? 2 : 2;
                lines = lines.slice(0, maxLines);

                // Draw each line
                const lineHeight = fontSize + 2;
                const startY = node.y - ((lines.length - 1) * lineHeight) / 2;
                lines.forEach((line, i) => {
                    ctx.fillText(line, node.x, startY + i * lineHeight);
                });
            });

            animationFrame = requestAnimationFrame(draw);
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            hoveredNode = null;
            nodes.forEach(node => {
                const dx = node.x - x;
                const dy = node.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < node.radius) {
                    hoveredNode = node;
                }
            });

            const tooltip = document.getElementById('tooltip');
            if (hoveredNode) {
                canvas.style.cursor = 'pointer';
                tooltip.querySelector('.tooltip-type').textContent = hoveredNode.type.toUpperCase();
                tooltip.querySelector('.tooltip-title').textContent = hoveredNode.name;
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.classList.add('visible');
            } else {
                canvas.style.cursor = 'default';
                tooltip.classList.remove('visible');
            }

            updateListHighlights();
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let clicked = null;
            nodes.forEach(node => {
                const dx = node.x - x;
                const dy = node.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < node.radius) {
                    clicked = node;
                }
            });

            if (clicked) {
                selectedNode = clicked;
                showDetail(clicked);
            } else {
                selectedNode = null;
                closeDetail();
            }

            updateListHighlights();
        }

        function showDetail(node) {
            const panel = document.getElementById('detailPanel');
            const typeEl = document.getElementById('detailType');
            const titleEl = document.getElementById('detailTitle');
            const contentEl = document.getElementById('detailContent');

            typeEl.textContent = node.type;
            titleEl.textContent = node.name;

            let html = '';

            if (node.type === 'initiative') {
                const goals = node.goals.map(gId => data.goals.find(g => g.id === gId));
                const teams = node.teams.map(tId => data.teams.find(t => t.id === tId));

                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Connected Goals</div>
                        ${goals.map(g => `<span class="tag goal" onclick="selectNodeById('${g.id}')">${g.name}</span>`).join('')}
                    </div>
                    <div class="detail-section">
                        <div class="detail-section-title">Teams Involved</div>
                        ${teams.map(t => `<span class="tag team" onclick="selectNodeById('${t.id}')">${t.name}</span>`).join('')}
                    </div>
                `;
            } else if (node.type === 'goal') {
                const initiatives = data.initiatives.filter(i => i.goals.includes(node.id));
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Initiatives (${initiatives.length})</div>
                        ${initiatives.map(i => `<span class="tag initiative" onclick="selectNodeById('${i.id}')">${i.name}</span>`).join('')}
                    </div>
                `;
            } else if (node.type === 'team') {
                const initiatives = data.initiatives.filter(i => i.teams.includes(node.id));
                const teamData = data.teams.find(t => t.id === node.id);
                const members = teamData.members || [];
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Team Members (${members.length})</div>
                        <div class="members-list">
                            ${members.map(m => `<div class="member-item"><span class="member-icon">👤</span>${m}</div>`).join('')}
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-section-title">Initiatives (${initiatives.length})</div>
                        ${initiatives.map(i => `<span class="tag initiative" onclick="selectNodeById('${i.id}')">${i.name}</span>`).join('')}
                    </div>
                `;
            }

            contentEl.innerHTML = html;
            panel.classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            selectedNode = null;
            updateListHighlights();
        }

        function selectNodeById(id) {
            const node = getNodeById(id);
            if (node) {
                selectedNode = node;
                showDetail(node);
                updateListHighlights();
            }
        }

        function updateListHighlights() {
            document.querySelectorAll('.list-item').forEach(item => {
                item.classList.remove('active');
                const id = item.dataset.id;
                if (selectedNode && selectedNode.id === id) {
                    item.classList.add('active');
                } else if (hoveredNode && hoveredNode.id === id) {
                    item.classList.add('active');
                }
            });
        }

        function renderLists() {
            const goalsList = document.getElementById('goalsList');
            const teamsList = document.getElementById('teamsList');

            goalsList.innerHTML = data.goals.map(g => `
                <div class="list-item" data-id="${g.id}" onclick="selectNodeById('${g.id}')">
                    <span class="goal-indicator" style="background: ${g.color}"></span>
                    ${g.name}
                </div>
            `).join('');

            teamsList.innerHTML = data.teams.map(t => `
                <div class="list-item team" data-id="${t.id}" onclick="selectNodeById('${t.id}')">
                    <span class="goal-indicator" style="background: ${t.color}"></span>
                    ${t.name}
                    <span style="color: var(--text-secondary); font-size: 0.75rem; margin-left: auto;">${t.members ? t.members.length : 0} members</span>
                </div>
            `).join('');
        }

        function initFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.filter;
                });
            });
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('mouseleave', () => {
            hoveredNode = null;
            document.getElementById('tooltip').classList.remove('visible');
            updateListHighlights();
        });

        resizeCanvas();
        renderLists();
        initFilters();
        draw();
    </script>
</body>
</html>
